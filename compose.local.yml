services:
  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: ptfp-mqtt-broker
    ports:
      - "1883:1883"
    volumes:
      - ./docs/infrastructure/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: ptfp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
  # lstm-service:
