services:
  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: ptfp-mqtt-broker
    ports:
      - "1883:1883"
    volumes:
      - ./docs/infrastructure/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  # Optional local infrastructure services for later stories.
  # Keep them disabled until the related implementation stories need them.
  # minio:
  # lstm-service:
